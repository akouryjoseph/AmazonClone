<div class="container">

  <h1>Order Placed Successfully!</h1>

  <p>Your order has been confirmed.</p>

  <h3>Order ID: {{ order?.orderId }}</h3>

  <h3>Total Paid: €{{ order?.total }}</h3>

  <h4>Items:</h4>

  <div *ngFor="let item of order?.items">
    <p>{{ item.product.name }} x{{ item.quantity }}</p>
  </div>

    <button (click)="goHome()">
        Back to Shop
    </button>

</div>
